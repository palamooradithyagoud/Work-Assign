<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — AssignIQ AI Workforce Management</title>
  <meta name="description" content="Create your AssignIQ account to optimize, plan, and orchestrate AI workloads and enterprise teams."/>
  
  <!-- FontAwesome & Fonts -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #09090b;
      color: #fafafa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    /* Grid background */
    .bg-grid {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 1;
      pointer-events: none;
    }
    /* Ambient Glowing Orbs */
    .bg-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.15;
      z-index: 2;
      pointer-events: none;
    }
    .bg-orb-1 {
      width: 400px;
      height: 400px;
      background: #8b5cf6;
      top: -100px;
      left: -100px;
    }
    .bg-orb-2 {
      width: 500px;
      height: 500px;
      background: #d946ef;
      bottom: -150px;
      right: -150px;
    }
    
    .auth-container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 20px;
    }
    
    .auth-logo {
      margin-bottom: 28px; 
      display: flex; 
      align-items: center; 
      gap: 12px; 
      justify-content: center;
    }
    
    .auth-logo i {
      font-size: 36px;
      background: linear-gradient(135deg, #8b5cf6, #d946ef);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .auth-logo .logo-text {
      font-weight: 800;
      font-size: 28px;
      color: white;
    }
    
    .auth-card {
      width: 100%;
      max-width: 440px;
      background: rgba(20, 20, 25, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 40px rgba(139, 92, 246, 0.05);
    }
    
    h1 {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
      text-align: center;
      background: linear-gradient(135deg, #ffffff, #a1a1aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .subtitle {
      font-size: 13.5px;
      color: #71717a;
      text-align: center;
      margin-bottom: 30px;
    }
    
    .form-group {
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
    }
    
    label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #a78bfa;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    input {
      width: 100%;
      padding: 13px 16px;
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      color: #ffffff;
      font-family: inherit;
      font-size: 14.5px;
      transition: all 0.2s ease;
    }
    
    input:focus {
      outline: none;
      border-color: #8b5cf6;
      background: rgba(0, 0, 0, 0.5);
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
    }
    
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #8b5cf6, #d946ef);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.25);
    }
    
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(139, 92, 246, 0.4);
      opacity: 0.95;
    }
    
    .btn-primary:active {
      transform: translateY(1px);
    }
    
    .auth-footer {
      text-align: center;
      font-size: 13px;
      color: #71717a;
      margin-top: 24px;
    }
    
    .auth-footer a {
      color: #a78bfa;
      text-decoration: none;
      font-weight: 600;
    }
    
    .auth-footer a:hover {
      text-decoration: underline;
    }
    
    /* Alert styling */
    .alert {
      display: none;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 20px;
      font-weight: 500;
    }
    .alert.show {
      display: block;
    }
    .alert-error {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #f87171;
    }
    .alert-success {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: #34d399;
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>

  <div class="auth-container">
    <div class="auth-logo">
      <i class="fa-solid fa-brain-circuit"></i>
      <div class="logo-text">Assign<span style="color: #a78bfa;">IQ</span></div>
    </div>

    <div class="auth-card">
      <h1>Create your account</h1>
      <p class="subtitle">Start optimizing and orchestrating project workloads</p>

      <div class="alert" id="auth-alert"></div>

      <form id="signup-form" novalidate>
        <div class="form-group">
          <label for="full-name"><i class="fa-regular fa-user"></i> Full Name</label>
          <input type="text" id="full-name" placeholder="John Doe" required/>
        </div>

        <div class="form-group">
          <label for="email"><i class="fa-regular fa-envelope"></i> Email Address</label>
          <input type="email" id="email" placeholder="you@assigniq.com" autocomplete="email" required/>
        </div>

        <div class="form-group">
          <label for="password"><i class="fa-solid fa-lock"></i> Password</label>
          <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password" required/>
        </div>

        <div class="form-group">
          <label for="confirm-password"><i class="fa-solid fa-circle-check"></i> Confirm Password</label>
          <input type="password" id="confirm-password" placeholder="Repeat your password" autocomplete="new-password" required/>
        </div>

        <button class="btn-primary" type="submit" id="signup-btn" style="margin-top: 10px;">
          <span id="signup-txt">Create Account</span>
          <div class="spinner" id="signup-spinner" style="display:none"></div>
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/login">Sign in →</a>
      </div>
    </div>
  </div>

  <script src="/static/auth.js"></script>
  <script>
    (async () => { await requireGuest(); })();

    document.getElementById("signup-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const fullName = document.getElementById("full-name").value.trim();
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirm  = document.getElementById("confirm-password").value;
      const btn      = document.getElementById("signup-btn");
      const txt      = document.getElementById("signup-txt");
      const spin     = document.getElementById("signup-spinner");
      const alert    = document.getElementById("auth-alert");

      alert.className = "alert";

      if (!fullName || !email || !password || !confirm) {
        alert.textContent = "Please fill in all fields.";
        alert.className = "alert alert-error show"; 
        return;
      }
      if (password.length < 8) {
        alert.textContent = "Password must be at least 8 characters.";
        alert.className = "alert alert-error show"; 
        return;
      }
      if (password !== confirm) {
        alert.textContent = "Passwords do not match.";
        alert.className = "alert alert-error show"; 
        return;
      }

      btn.disabled = true;
      txt.textContent = "Creating account...";
      if (spin) spin.style.display = "block";

      const { data, error } = await signUp(email, password, fullName);

      if (error) {
        alert.textContent = error.message;
        alert.className = "alert alert-error show";
        btn.disabled = false;
        txt.textContent = "Create Account";
        if (spin) spin.style.display = "none";
      } else {
        alert.textContent = "✅ Account created successfully! Redirecting...";
        alert.className = "alert alert-success show";
        document.getElementById("signup-form").style.display = "none";
        setTimeout(() => { window.location.href = "/login"; }, 2000);
      }
    });
  </script>
</body>
</html>
